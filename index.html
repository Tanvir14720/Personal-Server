<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saidpur Flix — Personal Library</title>
<style>
  :root{
    --bg:#f3f2ee;
    --card:#ffffff;
    --border:#e6e4dd;
    --text:#232320;
    --muted:#7a7770;
    --accent:#d8571f;
    --accent-dark:#b8481a;
    --dark:#1c1c1a;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Segoe UI', Roboto, Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  /* Header */
  header{
    background:var(--dark);
    color:#fff;
    position:sticky; top:0; z-index:50;
  }
  .header-inner{
    max-width:1200px; margin:0 auto;
    display:flex; align-items:center; gap:24px;
    padding:14px 20px;
  }
  .logo{
    font-size:22px; font-weight:700; letter-spacing:.5px;
    color:#fff; text-decoration:none; white-space:nowrap;
  }
  .logo span{color:var(--accent);}
  .search-box{
    flex:1; max-width:480px;
    display:flex; align-items:center;
    background:rgba(255,255,255,.08);
    border-radius:8px; padding:8px 14px;
  }
  .search-box input{
    flex:1; background:transparent; border:none; outline:none;
    color:#fff; font-size:14px;
  }
  .search-box input::placeholder{color:#aaa;}
  nav.cat-nav{
    background:#262523;
  }
  .cat-nav-inner{
    max-width:1200px; margin:0 auto;
    display:flex; gap:6px; padding:0 20px; overflow-x:auto;
  }
  .cat-tab{
    background:none; border:none; color:#ccc;
    padding:12px 18px; font-size:14px; cursor:pointer;
    border-bottom:3px solid transparent;
    white-space:nowrap;
  }
  .cat-tab.active{
    color:#fff; border-bottom-color:var(--accent); font-weight:600;
  }
  .cat-tab:hover{color:#fff;}

  /* Grid */
  main{max-width:1200px; margin:0 auto; padding:24px 20px 60px;}
  .section-title{
    font-size:18px; font-weight:700; margin:28px 0 14px;
    border-left:4px solid var(--accent); padding-left:10px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(170px, 1fr));
    gap:18px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
    display:flex; flex-direction:column;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 20px rgba(0,0,0,.08);
  }
  .poster{
    width:100%; aspect-ratio:2/3; object-fit:cover;
    background:#ddd;
  }
  .card-body{padding:10px 12px 12px; display:flex; flex-direction:column; gap:6px; flex:1;}
  .card-title{
    font-size:14px; font-weight:600; line-height:1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta{font-size:12px; color:var(--muted);}
  .btn-row{display:flex; gap:6px; margin-top:auto; padding-top:6px;}
  .rating-line{
    font-size:12px; color:var(--accent); font-weight:700;
    margin-top:6px; padding-top:2px;
  }
  .rating-line span{color:var(--muted); font-weight:600;}
  .btn{
    flex:1; text-align:center; padding:7px 4px; border-radius:6px;
    font-size:12px; font-weight:700; text-decoration:none; cursor:pointer; border:none;
  }
  .btn-download{background:var(--accent); color:#fff;}
  .btn-download:hover{background:var(--accent-dark);}
  .btn-watch{background:var(--dark); color:#fff;}
  .btn-watch:hover{background:#000;}

  .empty{color:var(--muted); font-size:14px; padding:40px 0; text-align:center;}

  /* Modal player */
  .modal-overlay{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.75);
    z-index:100; align-items:center; justify-content:center; padding:20px;
  }
  .modal-overlay.open{display:flex;}
  .modal-box{
    background:#000; width:100%; max-width:800px; border-radius:10px; overflow:hidden;
    position:relative;
  }
  .modal-box iframe{width:100%; height:450px; border:none; display:block;}
  .modal-close{
    position:absolute; top:8px; right:10px; background:rgba(255,255,255,.15);
    color:#fff; border:none; width:32px; height:32px; border-radius:50%;
    font-size:18px; cursor:pointer;
  }

  footer{
    text-align:center; padding:30px 20px; color:var(--muted); font-size:13px;
    border-top:1px solid var(--border);
  }
  footer b{color:var(--text);}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="#">Saidpur<span>Flix</span></a>
    <div class="search-box">
      <input id="searchInput" type="text" placeholder="মুভি, সিরিজ বা বই খুঁজুন...">
    </div>
  </div>
  <nav class="cat-nav">
    <div class="cat-nav-inner">
      <button class="cat-tab active" data-cat="all">All</button>
      <button class="cat-tab" data-cat="movie">Movies</button>
      <button class="cat-tab" data-cat="series">Web Series</button>
      <button class="cat-tab" data-cat="book">Books</button>
    </div>
  </nav>
</header>

<main>
  <div id="resultsInfo" class="section-title" style="display:none;"></div>
  <div id="grid" class="grid"></div>
  <p id="emptyMsg" class="empty" style="display:none;">কিছু খুঁজে পাওয়া যায়নি।</p>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <button class="modal-close" id="modalClose">✕</button>
    <iframe id="modalFrame" src="" allow="autoplay"></iframe>
  </div>
</div>

<footer>
  Powered by <b>Saidpur Flix</b><br>
  Theme by <b>Mashrur Tanvir Nasif</b>
</footer>

<script>
  // ---- Sample data — নিজের এন্ট্রি এখানে যোগ/বদলে দিন ----
  const items = [
    {
      title: "Gangs of Wasseypur (2012)",
      cat: "movie",
      meta: "Crime. Action. Drama · 2h 40m · 1080p",
      poster: "https://encrypted-tbn3.gstatic.com/images?q=tbn:ANd9GcTimDjjvxM5u4bWr3gJVnlAEx01y5TnUtS4O5YPbYtqoU5BTbiz",
      download: "https://drive.google.com/file/d/1BJ7KlnmydQrQDlZx0R8BqmzI_msWu_KB/view?usp=drive_link",
      rating: "8.2/10",
      watch: ""
    },
    {
      title: "Byomkesh Bakshi (2010)",
      cat: "movie",
      meta: "Mystery · Thriller · 1h 48m",
      poster: "https://upload.wikimedia.org/wikipedia/en/0/08/Byomkesh_Bakshi_2010_film_DVD_cover.png",
      download: "https://mega.nz/file/7ugAyKKC#eLdK1YCEsbHs1dL9jbM5sAWvMnsyhC4D4-ORZ8dS3LA",
      rating: "7.4/10",
      watch: ""
    },
    {
      title: "Dark — Season 1",
      cat: "series",
      meta: "Thriller · 10 episodes",
      poster: "https://via.placeholder.com/300x450/1e1e2e/ffffff?text=Dark+S01",
      download: "#",
      rating: "8.7/10",
      watch: ""
    },
    {
      title: "Sapiens",
      cat: "book",
      meta: "Non-fiction · PDF · 12 MB",
      poster: "https://via.placeholder.com/300x450/4a3b2a/ffffff?text=Sapiens",
      download: "#",
      rating: "4.6/10",
      watch: ""
    }
  ];

  const grid = document.getElementById('grid');
  const emptyMsg = document.getElementById('emptyMsg');
  let currentCat = 'all';
  let currentQuery = '';

  function render(){
    const filtered = items.filter(it=>{
      const matchCat = currentCat === 'all' || it.cat === currentCat;
      const matchQuery = it.title.toLowerCase().includes(currentQuery.toLowerCase());
      return matchCat && matchQuery;
    });

    grid.innerHTML = '';
    if(filtered.length === 0){
      emptyMsg.style.display = 'block';
    } else {
      emptyMsg.style.display = 'none';
    }

    filtered.forEach(it=>{
      const card = document.createElement('div');
      card.className = 'card';

      const watchBtn = it.watch
        ? `<button class="btn btn-watch" onclick="openWatch('${it.watch}')">Watch</button>`
        : '';

      card.innerHTML = `
        <img class="poster" src="${it.poster}" alt="${it.title}" onerror="this.onerror=null;this.src='https://via.placeholder.com/300x450/2b2b2b/ffffff?text=No+Image'">
        <div class="card-body">
          <div class="card-title">${it.title}</div>
          <div class="card-meta">${it.meta}</div>
          <div class="btn-row">
            <a class="btn btn-download" href="${it.download}">Download</a>
            ${watchBtn}
          </div>
          ${it.rating ? `<div class="rating-line">IMDb: <span>${it.rating}</span></div>` : ''}
        </div>
      `;
      grid.appendChild(card);
    });
  }

  document.querySelectorAll('.cat-tab').forEach(tab=>{
    tab.addEventListener('click', ()=>{
      document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      currentCat = tab.dataset.cat;
      render();
    });
  });

  document.getElementById('searchInput').addEventListener('input', (e)=>{
    currentQuery = e.target.value;
    render();
  });

  function openWatch(url){
    document.getElementById('modalFrame').src = url;
    document.getElementById('modalOverlay').classList.add('open');
  }
  document.getElementById('modalClose').addEventListener('click', ()=>{
    document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('modalFrame').src = '';
  });
  document.getElementById('modalOverlay').addEventListener('click', (e)=>{
    if(e.target.id === 'modalOverlay'){
      document.getElementById('modalOverlay').classList.remove('open');
      document.getElementById('modalFrame').src = '';
    }
  });

  render();
</script>

</body>
</html>
